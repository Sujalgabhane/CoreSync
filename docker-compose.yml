version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: coresync_postgres
    environment:
      POSTGRES_USER: coresync
      POSTGRES_PASSWORD: coresync_pass
      POSTGRES_DB: coresync
    ports:
      - "5432:5432"
    volumes:
      - coresync_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coresync"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: coresync_redis
    ports:
      - "6379:6379"
    volumes:
      - coresync_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  coresync_pg_data:
  coresync_redis_data:
